<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80" role="img" aria-label="谢立成印">
  <!-- 占位印章：阳文方印，朱砂底，白字。建议正式上线前替换为真实篆刻扫描件。 -->
  <rect x="2" y="2" width="96" height="96" fill="#A23F3F"/>
  <rect x="2" y="2" width="96" height="96" fill="none" stroke="#A23F3F" stroke-width="2"/>
  <g font-family="'Noto Serif SC', 'Songti SC', serif" font-weight="600" fill="#FAF8F3" text-anchor="middle" dominant-baseline="central" style="letter-spacing: -0.02em;">
    <text x="27" y="29" font-size="30">谢</text>
    <text x="73" y="29" font-size="30">立</text>
    <text x="27" y="73" font-size="30">成</text>
    <text x="73" y="73" font-size="30">印</text>
  </g>
</svg>
